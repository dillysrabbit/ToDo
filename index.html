<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
/* ── BRAUN / Dieter Rams Design-System · Variante "Papier" ──────────────────
   Mono misst (IBM Plex Mono), Grotesk spricht (Helvetica).
   Akzent = BRAUN-Orange, nur für aktive/markierte Elemente. */
:root {
  --mono:   'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
  --beton:  #D7D4CC;   /* Seite */
  --paper:  #E7E4DE;   /* Display */
  --surface:#F0EEE9;   /* Eingabeflächen */
  --ink:    #1B1A17;   /* Text */
  --muted:  #8A867E;   /* Sekundär */
  --line:   #C7C3BA;   /* Haarlinie */
  --accent: #D75A1E;   /* BRAUN-Orange */
  --acf:    #FFFFFF;   /* Auf Akzent */
}
::selection { background: var(--accent); color: #fff; }
html, body {
  width: 100%; min-height: 100vh;
  background: var(--beton); color: var(--ink);
  font-family: 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-user-select: none; user-select: none;
}
body {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
}

/* The R1-sized device frame (240x282). Faithfully recreated. */
#device {
  width: 240px; height: 282px;
  background: var(--paper); color: var(--ink);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.18);
  box-shadow: 0 2px 0 rgba(0,0,0,0.06), 0 16px 44px rgba(27,26,23,0.18);
}

#header {
  padding: 7px 12px 6px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
#list-name {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600; color: var(--accent);
  letter-spacing: 1.5px; text-transform: uppercase;
  min-width: 56px;
  cursor: pointer;
}
#dots { display: flex; gap: 5px; align-items: center; }
.dot {
  width: 6px; height: 6px; border-radius: 1px;
  background: var(--line);
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
}
.dot.active { background: var(--accent); transform: scale(1.2); }
#item-count { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; color: var(--muted); min-width: 36px; text-align: right; }

#status {
  font-family: var(--mono);
  padding: 0 12px; font-size: 10px; letter-spacing: 0.02em; color: var(--muted);
  text-align: center; flex-shrink: 0; height: 22px;
  display: flex; align-items: center; justify-content: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#status.listening { color: var(--accent); animation: pulse 0.8s ease infinite; }
#status.cycling { color: var(--ink); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

#list-container { flex: 1; overflow: hidden; position: relative; }
#list { position: absolute; top: 0; left: 0; right: 0; transition: transform 0.12s ease; }

.item { display: flex; align-items: center; padding: 0 12px 0 10px; height: 32px; gap: 10px; border-bottom: 1px solid var(--line); }
.item.checked { opacity: 0.55; }

.checkbox {
  width: 18px; height: 18px; border: 2px solid var(--accent); border-radius: 2px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s; position: relative;
}
.item.checked .checkbox { background: var(--accent); }
.checkbox::after {
  content: ''; display: none; width: 10px; height: 6px;
  border-left: 2px solid var(--paper); border-bottom: 2px solid var(--paper);
  transform: rotate(-45deg) translateY(-1px);
}
.item.checked .checkbox::after { display: block; }
.item-text {
  font-size: 13px; color: var(--ink); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.item.checked .item-text { text-decoration: line-through; color: var(--muted); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 220px; gap: 10px; }
.empty-text { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.7; }

#scrollbar { position: absolute; right: 3px; top: 4px; bottom: 4px; width: 3px; background: var(--line); border-radius: 1px; display: none; }
#scroll-thumb { position: absolute; left: 0; width: 3px; background: var(--accent); border-radius: 1px; opacity: 0.9; }

/* Edit screen */
#edit-screen {
  display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--paper); flex-direction: column; padding: 14px; z-index: 150;
}
#edit-screen.visible { display: flex; }
#edit-header {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; padding: 2px 0;
}
#edit-input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--line); border-radius: 2px;
  color: var(--ink); font-size: 13px; font-family: inherit;
  padding: 8px; resize: none; outline: none; line-height: 1.5;
}
#edit-input:focus { border-color: var(--accent); }
#edit-actions { display: flex; gap: 8px; margin-top: 10px; }
#edit-actions button {
  flex: 1; min-height: 36px; border: none; border-radius: 2px;
  font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#edit-actions button:active { opacity: 0.7; }
#edit-cancel { background: transparent; color: var(--ink); border: 1px solid var(--ink); font-weight: 500; }
#edit-save { background: var(--accent); color: var(--acf); }

/* Hilfe-Text unter dem Gerät */
#help {
  margin-top: 18px; max-width: 320px;
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.02em; color: var(--muted);
  line-height: 1.7; text-align: center;
}
#help b { color: var(--accent); font-weight: 600; }
#help kbd {
  display: inline-block; padding: 1px 6px; border-radius: 2px;
  background: #E9E6E0; border: 1px solid var(--line);
  font-family: var(--mono); font-size: 10px; color: var(--ink);
}
</style>
</head>
<body>

<div id="device">
  <div id="header">
    <div id="list-name">Home</div>
    <div id="dots">
      <div class="dot active" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
    </div>
    <div id="item-count"></div>
  </div>
  <div id="status">Leertaste halten zum Aufnehmen</div>
  <div id="list-container">
    <div id="list"></div>
    <div id="scrollbar"><div id="scroll-thumb"></div></div>
  </div>

  <div id="edit-screen">
    <div id="edit-header">Eintrag bearbeiten</div>
    <textarea id="edit-input"></textarea>
    <div id="edit-actions">
      <button id="edit-cancel">Abbrechen</button>
      <button id="edit-save">Speichern</button>
    </div>
  </div>
</div>

<div id="help">
  <kbd>Leertaste</kbd> halten = Sprache &nbsp;·&nbsp;
  <kbd>Enter</kbd> = neuer Eintrag &nbsp;·&nbsp;
  <kbd>Esc</kbd> / Klick auf den Listennamen = Liste wechseln<br>
  <kbd>↑</kbd>/<kbd>↓</kbd> = scrollen &nbsp;·&nbsp;
  Doppelklick = bearbeiten &nbsp;·&nbsp;
  langer Druck = löschen
</div>

<script>
var REMOVE_AFTER_MS = 3 * 60 * 60 * 1000;
var ITEM_HEIGHT = 32;
var VISIBLE_ITEMS = 7;

var LISTS = [
  { key: 'home',  label: 'Home'   },
  { key: 'aidev', label: 'AI Dev' },
  { key: 'rnd',   label: 'Random' }
];

var currentList = 0;
var scrollOffset = 0;
var isListening = false;

// ── Storage ──────────────────────────────────────────────────────────────
function storageKey(idx) { return 'r1_todo_' + LISTS[idx].key; }

function saveItems(items, idx) {
  try { localStorage.setItem(storageKey(idx), JSON.stringify(items)); } catch(e) {}
}
function loadItems(idx) {
  try { var r = localStorage.getItem(storageKey(idx)); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function purgeExpired(items) {
  var now = Date.now();
  return items.filter(function(i) { return !i.checked || (now - i.checkedAt) < REMOVE_AFTER_MS; });
}

// ── Render ───────────────────────────────────────────────────────────────
function render() {
  var items = loadItems(currentList);
  var list = document.getElementById('list');
  var countEl = document.getElementById('item-count');
  var scrollbar = document.getElementById('scrollbar');

  document.getElementById('list-name').textContent = LISTS[currentList].label;
  document.querySelectorAll('.dot').forEach(function(d) {
    d.className = 'dot' + (parseInt(d.dataset.i) === currentList ? ' active' : '');
  });

  var unchecked = items.filter(function(i) { return !i.checked; }).length;
  countEl.textContent = unchecked > 0 ? unchecked + ' offen' : (items.length > 0 ? 'fertig' : '');

  if (items.length === 0) {
    list.innerHTML = '<div class="empty-state">'
      + '<div class="empty-text">Noch nichts hier<br>Enter zum Hinzufügen</div></div>';
    scrollbar.style.display = 'none';
    return;
  }

  var maxScroll = Math.max(0, items.length - VISIBLE_ITEMS);
  scrollOffset = Math.min(Math.max(0, scrollOffset), maxScroll);

  if (items.length > VISIBLE_ITEMS) {
    scrollbar.style.display = 'block';
    var barH = ITEM_HEIGHT * VISIBLE_ITEMS;
    scrollbar.style.height = barH + 'px';
    var thumbH = Math.max(20, Math.round((VISIBLE_ITEMS / items.length) * barH));
    var thumbTop = Math.round((scrollOffset / Math.max(1, items.length - 1)) * (barH - thumbH));
    var thumb = document.getElementById('scroll-thumb');
    thumb.style.height = thumbH + 'px';
    thumb.style.top = thumbTop + 'px';
  } else {
    scrollbar.style.display = 'none';
  }

  var frag = document.createDocumentFragment();
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var div = document.createElement('div');
    div.className = 'item' + (item.checked ? ' checked' : '');
    div.dataset.id = item.id;
    var cb = document.createElement('div');
    cb.className = 'checkbox'; cb.dataset.id = item.id;
    var txt = document.createElement('div');
    txt.className = 'item-text'; txt.textContent = item.text;
    div.appendChild(cb); div.appendChild(txt);
    frag.appendChild(div);
  }
  list.innerHTML = '';
  list.appendChild(frag);
  list.style.transform = 'translateY(-' + (scrollOffset * ITEM_HEIGHT) + 'px)';

  list.querySelectorAll('.checkbox').forEach(function(cb) {
    cb.addEventListener('click', function(e) { e.stopPropagation(); toggleItem(cb.dataset.id); });
  });

  list.querySelectorAll('.item').forEach(function(row) {
    var pressTimer = null;
    var longFired = false;
    var lastTap = 0;
    var singleTimer = null;

    row.addEventListener('pointerdown', function(e) {
      if (e.target.closest('.checkbox')) return;
      longFired = false;
      pressTimer = setTimeout(function() {
        longFired = true;
        deleteItem(row.dataset.id);
      }, 600);
    });

    row.addEventListener('pointerup', function(e) {
      if (e.target.closest('.checkbox')) return;
      clearTimeout(pressTimer);
      if (longFired) return;
      var now = Date.now();
      if (now - lastTap < 320) {
        clearTimeout(singleTimer);
        lastTap = 0;
        editItem(row.dataset.id);
        return;
      }
      lastTap = now;
      singleTimer = setTimeout(function() { lastTap = 0; }, 320);
    });

    row.addEventListener('pointerleave', function() { clearTimeout(pressTimer); });
    row.addEventListener('pointercancel', function() { clearTimeout(pressTimer); });
  });
}

function toggleItem(id) {
  var items = loadItems(currentList);
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) {
      items[i].checked = !items[i].checked;
      items[i].checkedAt = items[i].checked ? Date.now() : null;
      break;
    }
  }
  saveItems(items, currentList);
  render();
}

function deleteItem(id) {
  var items = loadItems(currentList).filter(function(i) { return i.id !== id; });
  saveItems(items, currentList);
  render();
  setStatus('Gelöscht', '');
  resetStatus();
}

// ── Edit item ────────────────────────────────────────────────────────────
var editingId = null;
var $editScreen = document.getElementById('edit-screen');
var $editInput = document.getElementById('edit-input');

function editItem(id) {
  var items = loadItems(currentList);
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) {
      editingId = id;
      $editInput.value = items[i].text;
      $editScreen.classList.add('visible');
      $editInput.focus();
      return;
    }
  }
}

function openNewItem() {
  editingId = '__new__';
  $editInput.value = '';
  $editScreen.classList.add('visible');
  setTimeout(function() { $editInput.focus(); }, 0);
}

function closeEdit() {
  editingId = null;
  $editScreen.classList.remove('visible');
  $editInput.blur();
}

document.getElementById('edit-save').addEventListener('click', function() {
  if (!editingId) return;
  var text = $editInput.value.trim();
  if (!text) { closeEdit(); return; }
  if (editingId === '__new__') {
    closeEdit();
    addItem(text);
    return;
  }
  var items = loadItems(currentList);
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === editingId) { items[i].text = text; break; }
  }
  saveItems(items, currentList);
  closeEdit();
  render();
});

document.getElementById('edit-cancel').addEventListener('click', closeEdit);

// ── Status ───────────────────────────────────────────────────────────────
var statusTimer = null;
var DEFAULT_STATUS = 'Leertaste halten zum Aufnehmen';
function setStatus(msg, cls) {
  if (statusTimer) clearTimeout(statusTimer);
  var el = document.getElementById('status');
  el.textContent = msg; el.className = cls || '';
}
function resetStatus() {
  statusTimer = setTimeout(function() { setStatus(DEFAULT_STATUS, ''); }, 2000);
}

// ── Transcript normalisation ─────────────────────────────────────────────
var ORDINALS = [
  ['thirty first','31st'],['thirty second','32nd'],
  ['twenty ninth','29th'],['twenty eighth','28th'],['twenty seventh','27th'],
  ['twenty sixth','26th'],['twenty fifth','25th'],['twenty fourth','24th'],
  ['twenty third','23rd'],['twenty second','22nd'],['twenty first','21st'],
  ['twentieth','20th'],['nineteenth','19th'],['eighteenth','18th'],
  ['seventeenth','17th'],['sixteenth','16th'],['fifteenth','15th'],
  ['fourteenth','14th'],['thirteenth','13th'],['twelfth','12th'],
  ['eleventh','11th'],['tenth','10th'],['ninth','9th'],['eighth','8th'],
  ['seventh','7th'],['sixth','6th'],['fifth','5th'],['fourth','4th'],
  ['third','3rd'],['second','2nd'],['first','1st'],['thirtieth','30th']
];
var MONTH_RE = 'january|february|march|april|may|june|july|august|september|october|november|december';

function normalizeTranscript(text) {
  ORDINALS.forEach(function(pair) {
    text = text.replace(new RegExp('\\b' + pair[0] + '\\b', 'gi'), pair[1]);
  });
  text = text.replace(
    new RegExp('(\\d+(?:st|nd|rd|th))\\s+of\\s+(' + MONTH_RE + ')', 'gi'),
    '$1 $2'
  );
  return text;
}

// ── Add Item ─────────────────────────────────────────────────────────────
function addItem(text) {
  text = normalizeTranscript((text || '').trim()).replace(/[.!?,]+$/, '');
  if (!text) { setStatus('Nichts gehört — nochmal', ''); resetStatus(); return; }
  text = text.charAt(0).toUpperCase() + text.slice(1);
  var items = loadItems(currentList);
  items.unshift({ id: Date.now().toString(), text: text, checked: false, checkedAt: null });
  scrollOffset = 0;
  saveItems(items, currentList);
  render();
  setStatus('\u2713 ' + text, '');
  resetStatus();
}

// ── Cycle list ───────────────────────────────────────────────────────────
function cycleList() {
  currentList = (currentList + 1) % LISTS.length;
  scrollOffset = 0;
  render();
  setStatus(LISTS[currentList].label, 'cycling');
  resetStatus();
}

function setList(idx) {
  if (idx < 0 || idx >= LISTS.length || idx === currentList) return;
  currentList = idx;
  scrollOffset = 0;
  render();
  setStatus(LISTS[currentList].label, 'cycling');
  resetStatus();
}

document.getElementById('list-name').addEventListener('click', cycleList);
document.querySelectorAll('.dot').forEach(function(d) {
  d.addEventListener('click', function() { setList(parseInt(d.dataset.i)); });
});

// ── Voice via R1 CreationVoiceHandler (falls vorhanden) ──────────────────
window.onPluginMessage = function(data) {
  if (data.type !== 'sttEnded') return;
  isListening = false;
  var text = (data.transcript || '').trim();
  if (text) addItem(text);
  else { setStatus('Nichts gehört — nochmal', ''); resetStatus(); }
};

// ── Voice via Web Speech API (Browser-Fallback) ──────────────────────────
var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var recognitionStopping = false;
if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'de-DE';
  recognition.onresult = function(ev) {
    var transcript = '';
    for (var i = 0; i < ev.results.length; i++) {
      transcript += ev.results[i][0].transcript;
    }
    transcript = transcript.trim();
    if (transcript) addItem(transcript);
    else { setStatus('Nichts gehört — nochmal', ''); resetStatus(); }
  };
  recognition.onerror = function(ev) {
    isListening = false;
    if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
      setStatus('Mikrofon blockiert', '');
    } else if (ev.error !== 'no-speech' && ev.error !== 'aborted') {
      setStatus('Fehler: ' + ev.error, '');
    }
    resetStatus();
  };
  recognition.onend = function() {
    isListening = false;
    recognitionStopping = false;
  };
}

function startListening() {
  if (isListening || $editScreen.classList.contains('visible')) return;
  isListening = true;
  setStatus('Höre zu… loslassen zum Hinzufügen', 'listening');
  if (typeof CreationVoiceHandler !== 'undefined') {
    CreationVoiceHandler.postMessage('start');
    return;
  }
  if (recognition) {
    try { recognition.start(); }
    catch(e) { /* already started */ }
  } else {
    setStatus('Sprache nicht verfügbar — Enter drücken', '');
    isListening = false;
    resetStatus();
  }
}
function stopListening() {
  if (!isListening) return;
  if (typeof CreationVoiceHandler !== 'undefined') {
    CreationVoiceHandler.postMessage('stop');
    return;
  }
  if (recognition && !recognitionStopping) {
    recognitionStopping = true;
    try { recognition.stop(); } catch(e) {}
  }
}

// ── R1 Events (für Original-Hardware-Kompatibilität) ─────────────────────
window.addEventListener('longPressStart', startListening);
window.addEventListener('longPressEnd',   stopListening);
window.addEventListener('sideClick', function() {
  if (isListening || $editScreen.classList.contains('visible')) return;
  cycleList();
});
window.addEventListener('scrollUp', function() {
  if (scrollOffset > 0) { scrollOffset--; render(); }
});
window.addEventListener('scrollDown', function() {
  var items = loadItems(currentList);
  if (scrollOffset < Math.max(0, items.length - VISIBLE_ITEMS)) { scrollOffset++; render(); }
});

// ── Tastatur ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Im Edit-Screen: Esc schließt, Strg/Cmd+Enter speichert
  if ($editScreen.classList.contains('visible')) {
    if (e.key === 'Escape') { e.preventDefault(); closeEdit(); }
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      document.getElementById('edit-save').click();
    }
    return;
  }
  if (e.key === ' ' && !e.repeat) { e.preventDefault(); window.dispatchEvent(new Event('longPressStart')); }
  if (e.key === 'Escape') window.dispatchEvent(new Event('sideClick'));
  if (e.key === 'ArrowUp') { e.preventDefault(); window.dispatchEvent(new Event('scrollUp')); }
  if (e.key === 'ArrowDown') { e.preventDefault(); window.dispatchEvent(new Event('scrollDown')); }
  if (e.key === 'Enter' && !e.repeat) { e.preventDefault(); openNewItem(); }
});
document.addEventListener('keyup', function(e) {
  if ($editScreen.classList.contains('visible')) return;
  if (e.key === ' ') window.dispatchEvent(new Event('longPressEnd'));
});

// Mausrad → scrollen
document.getElementById('list-container').addEventListener('wheel', function(e) {
  e.preventDefault();
  if (e.deltaY < 0) window.dispatchEvent(new Event('scrollUp'));
  else if (e.deltaY > 0) window.dispatchEvent(new Event('scrollDown'));
}, { passive: false });

// ── Auto-purge ───────────────────────────────────────────────────────────
setInterval(function() {
  var changed = false;
  for (var i = 0; i < LISTS.length; i++) {
    var before = loadItems(i);
    var after = purgeExpired(before);
    if (after.length !== before.length) { saveItems(after, i); changed = true; }
  }
  if (changed) render();
}, 5 * 60 * 1000);

// ── Init ─────────────────────────────────────────────────────────────────
for (var i = 0; i < LISTS.length; i++) {
  var loaded = loadItems(i);
  var purged = purgeExpired(loaded);
  if (purged.length !== loaded.length) saveItems(purged, i);
}
render();
</script>
</body>
</html>
